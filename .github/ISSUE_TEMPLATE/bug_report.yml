name: Bug report
description: Report a problem with this library
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or steps that reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Language/runtime version, OS, and anything else relevant.
    validations:
      required: false
