# fleet-audit-register.yml — reusable: POST version snapshot to fleet status hub
#
# NOTE ON RUNNER:
#   This job only needs curl, so ubuntu-latest is sufficient. However, if the
#   caller fetches FLEET_TOKEN from internal Vault at job time (rather than
#   storing it as a GHA secret), the fetch step must run on arc-etamong-playground
#   since ubuntu-latest cannot reach vault.m.etamong.com. The recommended pattern
#   is to store FLEET_TOKEN as a GHA Actions secret at the repo/org level and
#   pass it here — then ubuntu-latest is fine.

on:
  workflow_call:
    inputs:
      app-name:
        description: "App identifier registered in the fleet status hub (e.g. 'draw', 'schedule-manager')"
        required: true
        type: string
      app-version:
        description: "Version string to register (defaults to the commit SHA)"
        required: false
        type: string
        default: ${{ github.sha }}
    secrets:
      FLEET_TOKEN:
        required: true

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Register version with fleet status hub
        env:
          FLEET_TOKEN: ${{ secrets.FLEET_TOKEN }}
          APP_NAME: ${{ inputs.app-name }}
          APP_VERSION: ${{ inputs.app-version }}
          CI_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$FLEET_TOKEN" ]; then
            echo "FLEET_TOKEN not set — skipping fleet status registration"
            exit 0
          fi

          BUILD_TIME=$(date -u +%FT%TZ)

          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-Internal-Secret: ${FLEET_TOKEN}" \
            --data "{\"version\":\"${APP_VERSION}\",\"sha\":\"${COMMIT_SHA}\",\"ci_run\":\"${CI_RUN_URL}\",\"time\":\"${BUILD_TIME}\"}" \
            "https://status.m.etamong.com/cluster/${APP_NAME}/ingest"
