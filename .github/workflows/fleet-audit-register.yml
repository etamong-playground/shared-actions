# fleet-audit-register.yml — reusable: POST a version snapshot to a version-audit hub
#
# Bring-your-own-infra: ingest-url and runner are inputs. POSTs to
# <ingest-url>/<app-name>/ingest with an X-Internal-Secret header.

on:
  workflow_call:
    inputs:
      ingest-url:
        description: "Version-audit ingest base URL, e.g. https://status.example.com/cluster"
        required: true
        type: string
      app-name:
        description: "App identifier"
        required: true
        type: string
      app-version:
        description: "Version string (defaults to the commit SHA)"
        required: false
        type: string
        default: ${{ github.sha }}
      runner:
        description: "Runner label (self-hosted if the ingest endpoint is network-internal)"
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      INGEST_TOKEN:
        required: true

jobs:
  register:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Register version
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          INGEST_URL: ${{ inputs.ingest-url }}
          APP_NAME: ${{ inputs.app-name }}
          APP_VERSION: ${{ inputs.app-version }}
          CI_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$INGEST_TOKEN" ]; then
            echo "INGEST_TOKEN not set — skipping version registration"
            exit 0
          fi
          BUILD_TIME=$(date -u +%FT%TZ)
          curl --fail --silent --show-error --request POST \
            --header "Content-Type: application/json" \
            --header "X-Internal-Secret: ${INGEST_TOKEN}" \
            --data "{\"version\":\"${APP_VERSION}\",\"sha\":\"${COMMIT_SHA}\",\"ci_run\":\"${CI_RUN_URL}\",\"time\":\"${BUILD_TIME}\"}" \
            "${INGEST_URL}/${APP_NAME}/ingest"
