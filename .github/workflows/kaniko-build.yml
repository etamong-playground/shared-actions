# kaniko-build.yml — reusable image build → push to an OCI registry (docker buildx)
#
# Bring-your-own-infra: registry host and runner are inputs. Use a self-hosted
# `runner` if your registry / secret manager is only reachable internally.
#
# WHY oci-mediatypes=true + provenance=false: many OCI registries (e.g. Zot)
# reject a Docker v2 schema-2 push over a tag already stored as OCI-typed
# (HTTP 400). buildx must emit OCI mediatypes on every push; provenance=false
# avoids an extra artifact-type manifest that confuses some registries' index.

on:
  workflow_call:
    inputs:
      registry:
        description: "Registry host/prefix, e.g. registry.example.com → registry.example.com/<image-name>"
        required: true
        type: string
      image-name:
        description: "Path under the registry, e.g. 'myapp'"
        required: true
        type: string
      runner:
        description: "Runner label. Use a self-hosted runner if the registry / secret manager is network-internal."
        required: false
        type: string
        default: "ubuntu-latest"
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      build-extra-args:
        description: "Additional build-args (newline-separated key=value)"
        required: false
        type: string
        default: ""
      cache:
        description: "Enable GitHub Actions cache for buildx layers"
        required: false
        type: boolean
        default: true
    secrets:
      REGISTRY_USER:
        required: true
      REGISTRY_PASSWORD:
        required: true
      NPM_TOKEN:
        description: "Optional npm token forwarded as the NPM_TOKEN build-arg (for Dockerfiles installing private packages)"
        required: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
            ${{ inputs.registry }}/${{ inputs.image-name }}:latest
          outputs: type=registry,oci-mediatypes=true
          provenance: false
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            NPM_TOKEN=${{ secrets.NPM_TOKEN }}
            ${{ inputs.build-extra-args }}
          cache-from: ${{ inputs.cache && format('type=gha,scope={0}', inputs.image-name) || '' }}
          cache-to: ${{ inputs.cache && format('type=gha,mode=max,scope={0}', inputs.image-name) || '' }}
