# pnpm-install — composite action: install with a private scoped-registry
#
# Bring-your-own-infra: registry URL, scope, and token are inputs. Fetch the
# token from your secret manager in the CALLING workflow and pass it in.
#
# WHY ~/.npmrc (not `pnpm config`): corepack-pinned pnpm reads auth from
# ~/.npmrc; `pnpm config set` writes elsewhere and is ignored.

name: pnpm-install
description: "pnpm install with auth for a private scoped npm registry"

inputs:
  working-directory:
    description: "Directory containing package.json / pnpm-lock.yaml"
    required: false
    default: "."
  registry-url:
    description: "Scoped npm registry URL, e.g. https://npm.example.com/api/packages/<org>/npm/"
    required: true
  scope:
    description: "npm scope, e.g. @myorg"
    required: true
  npm-token:
    description: "Auth token for the scoped registry (pass from your secret manager)"
    required: true

runs:
  using: composite
  steps:
    - name: Enable corepack
      shell: bash
      run: corepack enable
    - name: Write ~/.npmrc with scoped-registry auth
      shell: bash
      env:
        REGISTRY_URL: ${{ inputs.registry-url }}
        SCOPE: ${{ inputs.scope }}
        NPM_TOKEN: ${{ inputs.npm-token }}
      run: |
        REG_NO_SCHEME=$(printf '%s' "$REGISTRY_URL" | sed -E 's#^https?:##')
        {
          echo "${SCOPE}:registry=${REGISTRY_URL}"
          echo "${REG_NO_SCHEME}:_authToken=${NPM_TOKEN}"
        } >> ~/.npmrc
    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile --ignore-scripts
